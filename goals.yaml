# goals.yaml
# 富岳NEXTプロジェクト ゴール・マイルストーン定義
#
# 【運用ルール】
# - このファイルは意思決定者（近藤部門長・青木先生等）が承認した内容のみ記述する
# - LLMによる自動生成・編集は行わない
# - 変更は git コミットで管理し、意思決定の経緯を残す
# - 変更後は必ず pm_goals_import.py を実行して pm.db に反映する

project: 富岳NEXT

# --------------------------------------------------------------------------
# ゴール定義
# --------------------------------------------------------------------------
goals:
  - id: G1
    name: AI-HPCプラットフォームとして世界最高水準の性能達成
    description: >
      AI処理でゼタ(Zetta)スケールのピーク性能を念頭に50EFLOPS以上の実効性能を達成し、
      シミュレーションと AI の融合により総合的に 5～10 倍の実効計算性能向上分を超える数十倍のアプリ実行高速化を達成する。

  - id: G2
    name: アプリケーションの開発と支援
    description: >
      HPC アプリケーション WG は 2030 年運用開始と同時に成果を創出可能なアプリケーションの開発と支援を目的とする。

  - id: G3
    name: ベンチマークフレームワークの構築
    description: >
      ベンチマーク WG ではアプリケーションの開発を円滑に進めるためのベンチマークフレームワークの開発・展開を目的とする。

# --------------------------------------------------------------------------
# 2025年度マイルストーン定義
# --------------------------------------------------------------------------
milestones:
  - id: M1
    goal_id: G1
    name: 2025年度基本設計完了
    due_date: 2026-03-18
    area: 全エリア
    success_criteria:
      - NVIDIAとの性能倍率合意
      - 基本設計技術報告書の提出

  - id: M2
    goal_id: G1
    name: 2026年度詳細設計完了(1)
    due_date: 2027-03-31
    area: 全エリア
    success_criteria:
      - 詳細設計(1)技術報告書の提出

  - id: M3
    goal_id: G1
    name: 2027年度詳細設計完了(2)
    due_date: 2028-03-31
    area: 全エリア
    success_criteria:
      - 詳細設計(2)技術報告書の提出

  - id: M4
    goal_id: G1
    name: 2028年度詳細設計完了(3)
    due_date: 2029-03-31
    area: 全エリア
    success_criteria:
      - 詳細設計(3)技術報告書の提出

  - id: M5
    goal_id: G2
    name: 富岳NEXT 稼働開始
    due_date: 2030-04-01
    area: 全エリア
    success_criteria:
      - システム受け入れ試験完了
      - 富岳からの移行計画実施・利用者サービス開始
      - 運用技術（温水冷却・省エネ）の稼働確認
