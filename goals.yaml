# goals.yaml
# 富岳NEXTプロジェクト ゴール・マイルストーン定義
#
# 【運用ルール】
# - このファイルは意思決定者（近藤部門長・青木先生等）が承認した内容のみ記述する
# - LLMによる自動生成・編集は行わない
# - 変更は git コミットで管理し、意思決定の経緯を残す
# - 変更後は必ず pm_goals_import.py を実行して pm.db に反映する

project: 富岳NEXT

# --------------------------------------------------------------------------
# ゴール定義
# --------------------------------------------------------------------------
goals:
  - id: G1
    name: AI-HPCプラットフォームとして世界最高水準の性能達成
    description: >
      FP8でゼタスケール（Zetta FLOPS）を達成し、AIとシミュレーションの双方で
      世界最高水準の性能を実現する。MONAKA-X（富士通製CPU）とNVIDIA GPUを
      NVLink-C2Cで密結合した AI-HPC プラットフォームを構築する。

  - id: G2
    name: 2030年頃の安定稼働開始
    description: >
      富岳からのシステム移行時に計算資源が利用不可となる期間を極力生じさせず、
      世界最高水準の計算性能・資源を安定的に提供し続ける体制を整える。

# --------------------------------------------------------------------------
# マイルストーン定義
# --------------------------------------------------------------------------
milestones:
  - id: M1
    goal_id: G1
    name: 基本設計完了
    due_date: 2026-03-18
    area: 全エリア
    success_criteria:
      - 基本設計技術報告書（最終版）の提出
      - NVIDIAとの性能倍率合意
      - 富士通・NVIDIA・理研 3者間での基本仕様合意

  - id: M2
    goal_id: G1
    name: 詳細設計完了
    due_date: 2027-03-31
    area: 全エリア
    success_criteria:
      - 詳細設計技術報告書の提出
      - アーキテクチャ・システムソフトウェア・アプリケーション各エリアの設計承認

  - id: M3
    goal_id: G1
    name: テストベッド Phase-1 稼働
    due_date: 2026-09-30
    area: アーキテクチャ・アプリケーション
    success_criteria:
      - GPU環境（NVL72相当）の整備完了
      - 主要アプリケーション（GENESIS・SCALE-LETKF等）の動作確認
      - Benchpark による継続的ベンチマーク環境の整備

  - id: M4
    goal_id: G1
    name: アプリケーション GPU 化・最適化完了
    due_date: 2028-03-31
    area: アプリケーション開発エリア
    success_criteria:
      - HPCアプリケーションWG 全 SubWG アプリの GPU 対応完了
      - 富岳 vs 富岳NEXT 性能比の実測による検証
      - Benchpark CI/CD 環境での継続的性能監視体制確立

  - id: M5
    goal_id: G2
    name: 富岳NEXT 稼働開始
    due_date: 2030-03-31
    area: 全エリア
    success_criteria:
      - システム受け入れ試験完了
      - 富岳からの移行計画実施・利用者サービス開始
      - 運用技術（温水冷却・省エネ）の稼働確認
