# QAインデックス定義ファイル
#
# indices:
#   {index名}:
#     db: インデックスDBのパス（data/ 以下）
#     minutes: 対象の会議種別名リスト（data/minutes/{name}.db の {name}）
#     channels: 対象のSlackチャンネルIDリスト
#
# channel_map:
#   {チャンネルID}: {index名}
#   ここにないチャンネルでは default_index を使用
#
# default_index: マッピングなしチャンネルのフォールバック
#
# <CHANNEL_ID> | 00_次世代計算基盤開発部門
# <CHANNEL_ID> | 03_次世代計算基盤部門定例会議メンバ
# <CHANNEL_ID> | 04_hpci計画推進委員会資料作成
# <CHANNEL_ID> | 09_エリアリーダー_テクニカル
# <CHANNEL_ID> | 91_基本設計技術報告書作成
# <CHANNEL_ID> | 92_詳細設計1技術報告書作成2026
# <CHANNEL_ID> | 92_詳細設計調達
# <CHANNEL_ID> | 20_アプリケーション開発エリア
# <CHANNEL_ID> | 20_1_リーダ会議メンバ
# <CHANNEL_ID> | 21_hpcアプリケーションwg
# <CHANNEL_ID> | 21_1_hpcアプリケーションwg_ブロック1
# <CHANNEL_ID> | 21_2_hpcアプリケーションwg_ブロック2
# <CHANNEL_ID> | 22_ベンチマークwg
# <CHANNEL_ID> | 23_benchmark_framework
# <CHANNEL_ID> | 24_ai-hpc-application

indices:
  pm:
    db: data/qa_pm.db
    minutes: [Leader_Meeting, Co-design_Review_Meeting, Block1_Meeting, Block2_Meeting, SubWG1_Meeting, SubWG3_Meeting, SubWG4_Meeting, SubWG6_Meeting, SubWG7_Meeting, SubWG8_Meeting, BenchmarkWG_Meeting]
    channels: [<CHANNEL_ID>, <CHANNEL_ID>, <CHANNEL_ID>, <CHANNEL_ID>, <CHANNEL_ID>, <CHANNEL_ID>, <CHANNEL_ID>, <CHANNEL_ID>, <CHANNEL_ID>, <CHANNEL_ID>]

  pm-hpc:
    db: data/qa_pm-hpc.db
    minutes: [Block1_Meeting, Block2_Meeting, SubWG1_Meeting, SubWG3_Meeting, SubWG4_Meeting, SubWG6_Meeting, SubWG7_Meeting, SubWG8_Meeting]
    channels: [<CHANNEL_ID>, <CHANNEL_ID>, <CHANNEL_ID>, <CHANNEL_ID>, <CHANNEL_ID>]

  pm-bmt:
    db: data/qa_pm-bmt.db
    minutes: [BenchmarkWG_Meeting]
    channels: [<CHANNEL_ID>, <CHANNEL_ID>, <CHANNEL_ID>]

  pm-pmo:
    db: data/qa_pm-pmo.db
    minutes: []
    channels: [<CHANNEL_ID>, <CHANNEL_ID>, <CHANNEL_ID>, <CHANNEL_ID>, <CHANNEL_ID>, <CHANNEL_ID>, <CHANNEL_ID>]

  pm-all:
    db: data/qa_pm-all.db
    minutes: [Leader_Meeting, Co-design_Review_Meeting, Block1_Meeting, Block2_Meeting, SubWG1_Meeting, SubWG3_Meeting, SubWG4_Meeting, SubWG6_Meeting, SubWG7_Meeting, SubWG8_Meeting, BenchmarkWG_Meeting]
    channels: [<CHANNEL_ID>, <CHANNEL_ID>, <CHANNEL_ID>, <CHANNEL_ID>, <CHANNEL_ID>, <CHANNEL_ID>, <CHANNEL_ID>, <CHANNEL_ID>, <CHANNEL_ID>, <CHANNEL_ID>, <CHANNEL_ID>, <CHANNEL_ID>, <CHANNEL_ID>, <CHANNEL_ID>, <CHANNEL_ID>]

# /ask 実行チャンネル → インデックス名のマッピング
channel_map:
   <CHANNEL_ID>: pm
   <CHANNEL_ID>: pm-hpc
   <CHANNEL_ID>: pm-hpc
   <CHANNEL_ID>: pm-hpc
   <CHANNEL_ID>: pm-hpc
   <CHANNEL_ID>: pm-bmt
   <CHANNEL_ID>: pm-bmt
   <CHANNEL_ID>: pm-pmo
   <CHANNEL_ID>: pm-pmo
   <CHANNEL_ID>: pm-all

# マッピングなしチャンネルのフォールバック
default_index: pm
