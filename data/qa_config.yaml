# QAインデックス定義ファイル
#
# indices:
#   {index名}:
#     db: インデックスDBのパス（data/ 以下）
#     minutes: 対象の会議種別名リスト（data/minutes/{name}.db の {name}）
#     channels: 対象のSlackチャンネルIDリスト
#
# channel_map:
#   {チャンネルID}: {index名}
#   ここにないチャンネルでは default_index を使用
#
# default_index: マッピングなしチャンネルのフォールバック

indices:
  pm:
    db: data/qa_pm.db
    minutes: [Leader_Meeting, Co-design_Review_Meeting]
    channels: [<CHANNEL_ID>, <CHANNEL_ID>, <CHANNEL_ID>, <CHANNEL_ID>, <CHANNEL_ID>, <CHANNEL_ID>, <CHANNEL_ID>, <CHANNEL_ID>]

  pm-hpc:
    db: data/qa_pm-hpc.db
    minutes: [Block1_Meeting, Block2_Meeting, SubWG1_Meeting, SubWG3_Meeting, SubWG4_Meeting, SubWG6_Meeting, SubWG7_Meeting, SubWG8_Meeting]
    channels: [<CHANNEL_ID>, <CHANNEL_ID>, <CHANNEL_ID>, <CHANNEL_ID>, <CHANNEL_ID>]

  pm-bmt:
    db: data/qa_pm-bmt.db
    minutes: [BenchmarkWG_Meeting]
    channels: [<CHANNEL_ID>, <CHANNEL_ID>, <CHANNEL_ID>]

  pm-pmo:
    db: data/qa_pm-pmo.db
    minutes: []
    channels: [<CHANNEL_ID>]

# /ask 実行チャンネル → インデックス名のマッピング
channel_map: {}
#  <CHANNEL_ID>: pm
#  <CHANNEL_ID>: pm-hpc
#  <CHANNEL_ID>: pm-hpc
#  <CHANNEL_ID>: pm-hpc
#  <CHANNEL_ID>: pm-hpc
#  <CHANNEL_ID>: pm-bmt
#  <CHANNEL_ID>: pm-bmt
#  <CHANNEL_ID>: pm-pmo
#  <CHANNEL_ID>: pm-pmo

# マッピングなしチャンネルのフォールバック
default_index: pm
