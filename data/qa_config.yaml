# QAインデックス定義ファイル
#
# indices:
#   {index名}:
#     db: インデックスDBのパス（data/ 以下）
#     minutes: 対象の会議種別名リスト（data/minutes/{name}.db の {name}）
#     channels: 対象のSlackチャンネルIDリスト
#
# channel_map:
#   {チャンネルID}: {index名}
#   ここにないチャンネルでは default_index を使用
#
# default_index: マッピングなしチャンネルのフォールバック
#
# C08M002D7TQ | 00_次世代計算基盤開発部門
# C08PE3K9N72 | 03_次世代計算基盤部門定例会議メンバ
# C09AANCC649 | 04_hpci計画推進委員会資料作成
# C097A2P387R | 09_エリアリーダー_テクニカル
# C0A5MRRP268 | 91_基本設計技術報告書作成
# C0AS2JKS200 | 92_詳細設計1技術報告書作成2026
# C09JMEA157E | 92_詳細設計調達
# C08M0249GRL | 20_アプリケーション開発エリア
# C08SXA4M7JT | 20_1_リーダ会議メンバ
# C08LSJP4R6K | 21_hpcアプリケーションwg
# C093DQFSCRH | 21_1_hpcアプリケーションwg_ブロック1
# C093LP1J15G | 21_2_hpcアプリケーションwg_ブロック2
# C08MJ0NF5UZ | 22_ベンチマークwg
# C096ER1A0LU | 23_benchmark_framework
# C0A6AC59AHM | 24_ai-hpc-application

indices:
  pm:
    db: data/qa_pm.db
    minutes: [Leader_Meeting, Co-design_Review_Meeting, Block1_Meeting, Block2_Meeting, SubWG1_Meeting, SubWG3_Meeting, SubWG4_Meeting, SubWG6_Meeting, SubWG7_Meeting, SubWG8_Meeting, BenchmarkWG_Meeting]
    channels: [C08M002D7TQ, C097A2P387R, C08M0249GRL, C08SXA4M7JT, C08LSJP4R6K, C093DQFSCRH, C093LP1J15G, C08MJ0NF5UZ, C096ER1A0LU, C0A6AC59AHM]

  pm-hpc:
    db: data/qa_pm-hpc.db
    minutes: [Block1_Meeting, Block2_Meeting, SubWG1_Meeting, SubWG3_Meeting, SubWG4_Meeting, SubWG6_Meeting, SubWG7_Meeting, SubWG8_Meeting]
    channels: [C08M0249GRL, C08LSJP4R6K, C093DQFSCRH, C093LP1J15G, C0A6AC59AHM]

  pm-bmt:
    db: data/qa_pm-bmt.db
    minutes: [BenchmarkWG_Meeting]
    channels: [C08M0249GRL, C08MJ0NF5UZ, C096ER1A0LU]

  pm-pmo:
    db: data/qa_pm-pmo.db
    minutes: []
    channels: [C08M002D7TQ, C09AANCC649, C097A2P387R, C0A5MRRP268, C0AS2JKS200, C09JMEA157E, C08PE3K9N72]

  pm-all:
    db: data/qa_pm-all.db
    minutes: [Leader_Meeting, Co-design_Review_Meeting, Block1_Meeting, Block2_Meeting, SubWG1_Meeting, SubWG3_Meeting, SubWG4_Meeting, SubWG6_Meeting, SubWG7_Meeting, SubWG8_Meeting, BenchmarkWG_Meeting]
    channels: [C08M002D7TQ, C08PE3K9N72, C09AANCC649, C097A2P387R, C0A5MRRP268, C0AS2JKS200, C09JMEA157E, C08M0249GRL, C08SXA4M7JT, C08LSJP4R6K, C093DQFSCRH, C093LP1J15G, C08MJ0NF5UZ, C096ER1A0LU, C0A6AC59AHM]

# /ask 実行チャンネル → インデックス名のマッピング
channel_map:
   C08SXA4M7JT: pm
   C08LSJP4R6K: pm-hpc
   C093DQFSCRH: pm-hpc
   C093LP1J15G: pm-hpc
   C0A6AC59AHM: pm-hpc
   C08MJ0NF5UZ: pm-bmt
   C096ER1A0LU: pm-bmt
   C08M0249GRL: pm-pmo
   C08PE3K9N72: pm-pmo
   C0A9KG036CS: pm-all

