# recall_gold.yaml — Argus retrieval recall 回帰評価のゴールドセット
#
# 「エンティティ×既知の在窓事実」を curator（人間）が定義し、scripts/eval/recall_eval.py
# の resolve サブコマンドで現行 qa_index.db の chunk id 集合へ解決する。
# 解決した chunk id が run サブコマンドでの gold（正解集合）として使われる。
#
# 注意（curator が踏みやすい罠）:
#   chunks.source_ref は source_type='box_document' の場合、常に Box ファイル URL
#   （例: https://app.box.com/file/<id>）であり、ファイル名を含まない
#   （scripts/data-pipeline/pm_embed.py の box_document 取り込み処理を参照）。
#   ファイル名で絞り込みたい場合は resolve.source_ref_like ではなく、
#   resolve.must_contain に content 先頭の見出し行
#   「【…/ファイル名】」の断片を入れること。
#   source_ref_like フィールド自体は、source_ref が別の意味を持つ source_type
#   （slack_raw の permalink 等）向けにスキーマとして残してある。

version: 1
default_index_name: pm
default_k_list: [5, 10, 30, 60]

