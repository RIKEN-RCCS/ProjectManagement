<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>議事録</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    .prose h1,.prose h2,.prose h3 { margin-top: 1.2em; font-weight: bold; }
    .prose h1 { font-size: 1.5rem; }
    .prose h2 { font-size: 1.25rem; }
    .prose h3 { font-size: 1.1rem; }
    .prose p  { margin: 0.5em 0; }
    .prose ul,.prose ol { margin: 0.5em 0; padding-left: 1.5em; }
    .prose li { margin: 0.2em 0; }
    .prose hr { margin: 1.5em 0; border-color: #e5e7eb; }
    .prose code { background: #f3f4f6; padding: 1px 4px; border-radius: 3px; font-size: 0.9em; }
    .prose pre { background: #f3f4f6; padding: 12px; border-radius: 6px; overflow-x: auto; }
  </style>
</head>
<body class="p-4">
  <div class="flex items-center gap-3 mb-4">
    <span id="title" class="text-xl font-bold flex-1"></span>
    <span id="badge" class="hidden bg-blue-100 text-blue-800 text-xs font-medium px-2 py-0.5 rounded"></span>
    <button onclick="window.close()" class="text-gray-400 hover:text-gray-600 text-2xl leading-none">&times;</button>
  </div>
  <div id="content" class="prose max-w-none"></div>
  <div id="loading" class="text-gray-500">読み込み中...</div>
  <div id="error" class="text-red-500 hidden"></div>

  <script>
    (async () => {
      const params = new URLSearchParams(location.search);
      const meetingId = params.get('id') || '';
      const kind = params.get('kind') || '';

      document.getElementById('title').textContent = meetingId || '?';
      document.title = `議事録: ${meetingId}`;
      if (kind) {
        const b = document.getElementById('badge');
        b.textContent = kind;
        b.classList.remove('hidden');
      }

      if (!meetingId) {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('error').textContent = 'meeting_id が指定されていません';
        document.getElementById('error').classList.remove('hidden');
        return;
      }

      try {
        const res = await fetch(`/api/minutes?id=${encodeURIComponent(meetingId)}&kind=${encodeURIComponent(kind)}`);
        const data = await res.json();
        document.getElementById('loading').classList.add('hidden');
        if (data.content) {
          document.getElementById('content').innerHTML = marked.parse(data.content);
        } else {
          document.getElementById('error').textContent = '議事録が見つかりません';
          document.getElementById('error').classList.remove('hidden');
        }
      } catch (e) {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('error').textContent = `読み込みエラー: ${e.message}`;
        document.getElementById('error').classList.remove('hidden');
      }
    })();
  </script>
</body>
</html>
